<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VoiceCraft Edge — Free TTS</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--s1:#0c0d18;--s2:#11121e;--s3:#181926;
  --border:#20213a;--border2:#2a2b45;
  --teal:#3ecfb2;--teal2:#6ee8d0;
  --tealdim:rgba(62,207,178,0.10);--tealglow:rgba(62,207,178,0.22);
  --violet:#8b6cf7;--violetdim:rgba(139,108,247,0.10);
  --text:#eaeaf4;--muted:#606080;--muted2:#404058;
  --green:#3ecfb2;--red:#f06e7e;--radius:18px;
}
*{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}

/* texture */
body::after{content:'';position:fixed;inset:0;opacity:.35;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}

/* scanlines */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(62,207,178,0.018) 48px)}

/* orbs */
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(110px);z-index:0}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(62,207,178,0.08) 0%,transparent 70%);top:-150px;right:-100px;animation:drift 14s ease-in-out infinite}
.orb2{width:350px;height:350px;background:radial-gradient(circle,rgba(139,108,247,0.07) 0%,transparent 70%);bottom:-80px;left:-80px;animation:drift 18s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-35px)}}

.wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:52px 22px 96px}

/* ── header ── */
header{margin-bottom:56px;animation:fadeUp .8s ease both}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--tealdim);border:1px solid rgba(62,207,178,.2);border-radius:100px;padding:5px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal);margin-bottom:24px}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:pulse 1.8s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
h1{font-family:'Instrument Serif',serif;font-size:clamp(3rem,8vw,5.5rem);font-weight:400;font-style:italic;line-height:.93;letter-spacing:-2px;margin-bottom:14px}
h1 span{font-style:normal;background:linear-gradient(110deg,var(--teal),var(--teal2),var(--violet));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 5s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.tagline{font-size:.9rem;color:var(--muted);letter-spacing:.3px}
.free-pill{display:inline-block;background:rgba(62,207,178,.1);border:1px solid rgba(62,207,178,.25);border-radius:6px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--teal);letter-spacing:1px;margin-left:8px;vertical-align:middle}

/* ── section ── */
.sec{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── card ── */
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius);padding:26px;margin-bottom:14px;transition:border-color .3s;animation:fadeUp .65s ease both}
.card:nth-child(2){animation-delay:.07s}.card:nth-child(3){animation-delay:.14s}.card:nth-child(4){animation-delay:.21s}
.card:hover{border-color:var(--border2)}

/* ── textarea ── */
textarea{width:100%;min-height:185px;background:var(--s1);border:1px solid var(--border);border-radius:13px;padding:18px;color:var(--text);font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:300;line-height:1.75;resize:vertical;outline:none;transition:border-color .2s,box-shadow .2s}
textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--tealdim)}
textarea::placeholder{color:var(--muted2)}
.meta-row{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
.char-pill{font-family:'DM Mono',monospace;font-size:11px;background:var(--s3);border:1px solid var(--border);border-radius:100px;padding:3px 11px;color:var(--muted)}
.char-pill.warn{border-color:rgba(240,110,126,.4);color:var(--red)}
.free-note{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2)}

/* ── voice grid ── */
.voice-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.voice-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .2s;position:relative}
.voice-card:hover{border-color:var(--border2);background:var(--s3)}
.voice-card.selected{border-color:var(--teal);background:var(--tealdim);box-shadow:0 0 0 1px var(--teal) inset}
.voice-card.selected::after{content:'✦';position:absolute;top:10px;right:12px;font-size:10px;color:var(--teal)}
.vc-name{font-size:.9rem;font-weight:500;margin-bottom:3px}
.vc-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);display:flex;gap:6px}
.vc-gender{font-size:10px}

/* filter tabs */
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.ftab{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);cursor:pointer;transition:all .2s}
.ftab:hover{border-color:var(--border2);color:var(--text)}
.ftab.active{background:var(--tealdim);border-color:rgba(62,207,178,.35);color:var(--teal)}

/* ── range ── */
.range-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:500px){.range-row{grid-template-columns:1fr}}
.range-field{display:flex;flex-direction:column;gap:6px}
.rl{display:flex;justify-content:space-between;align-items:center}
.rl label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.rv{font-family:'DM Mono',monospace;font-size:12px;color:var(--teal);font-weight:500}
input[type=range]{-webkit-appearance:none;width:100%;height:34px;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:var(--border2);border-radius:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--teal);margin-top:-7px;box-shadow:0 0 10px var(--tealglow);transition:transform .15s}
input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.25)}

/* ── convert btn ── */
.convert-btn{width:100%;padding:19px;background:linear-gradient(135deg,#3ecfb2,#2aaf95);border:none;border-radius:15px;color:#061412;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;letter-spacing:.4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:11px;transition:all .25s;box-shadow:0 8px 30px rgba(62,207,178,.22);position:relative;overflow:hidden}
.convert-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent);opacity:0;transition:opacity .2s}
.convert-btn:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(62,207,178,.32)}
.convert-btn:hover::before{opacity:1}
.convert-btn:active{transform:translateY(0)}
.convert-btn:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
.ci{font-size:1.15rem;transition:transform .3s}
.convert-btn:not(:disabled):hover .ci{transform:rotate(20deg)}

/* progress */
.prog-wrap{display:none;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:15px 18px;margin-top:12px;align-items:center;gap:12px}
.prog-wrap.show{display:flex}
.spin{width:18px;height:18px;flex-shrink:0;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.prog-txt{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);flex:1}
.prog-bar-wrap{width:100%;height:3px;background:var(--border);border-radius:3px;margin-top:7px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));width:0%;transition:width .35s ease;border-radius:3px}

/* result */
.result{display:none;background:linear-gradient(135deg,rgba(62,207,178,.06),rgba(139,108,247,.04));border:1px solid rgba(62,207,178,.18);border-radius:var(--radius);padding:22px;margin-top:12px}
.result.show{display:block;animation:fadeUp .4s ease both}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.rt{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);display:flex;align-items:center;gap:8px}
.rt::before{content:'◆'}
.dl-btn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#3ecfb2,#2aaf95);border:none;border-radius:9px;padding:9px 18px;color:#061412;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(62,207,178,.22)}
.dl-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(62,207,178,.32)}
audio{width:100%;height:40px;border-radius:9px;filter:invert(1) hue-rotate(180deg) brightness(.88)}
.rmeta{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap}
.mi{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
.mi strong{color:var(--text);font-weight:500;font-size:11px}

/* history */
.hlist{display:flex;flex-direction:column;gap:9px}
.hi{background:var(--s1);border:1px solid var(--border);border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .2s;animation:fadeUp .3s ease both}
.hi:hover{border-color:var(--border2)}
.hn{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);width:22px;text-align:right;flex-shrink:0}
.hinfo{flex:1;min-width:0}
.htxt{font-size:.88rem;font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.hsub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.hdl{background:var(--tealdim);border:1px solid rgba(62,207,178,.22);border-radius:7px;padding:7px 12px;color:var(--teal);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;white-space:nowrap;transition:all .2s}
.hdl:hover{background:rgba(62,207,178,.18)}
.empty{text-align:center;padding:32px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:1px}

/* server url */
.url-row{display:flex;gap:10px;align-items:stretch}
.url-inp{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;outline:none;transition:border-color .2s;letter-spacing:.5px}
.url-inp:focus{border-color:var(--teal)}
.url-inp::placeholder{color:var(--muted2);letter-spacing:0}
.url-save{background:var(--tealdim);border:1px solid rgba(62,207,178,.3);border-radius:12px;padding:13px 20px;color:var(--teal);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;white-space:nowrap;transition:all .2s;font-weight:500}
.url-save:hover{background:rgba(62,207,178,.18);border-color:rgba(62,207,178,.45)}
.srv-status{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:11px;margin-top:9px;color:var(--muted)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted2);flex-shrink:0;transition:background .3s}
.sdot.ok{background:var(--green);box-shadow:0 0 7px rgba(62,207,178,.5)}
.sdot.err{background:var(--red)}
.sdot.checking{background:var(--violet);animation:pulse 1s ease infinite}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--s3);border:1px solid var(--border2);border-radius:100px;padding:11px 22px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);z-index:1000;transition:transform .3s,opacity .3s;opacity:0;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="wrap">

  <header>
    <div class="badge"><span class="badge-dot"></span>Microsoft Edge TTS</div>
    <h1>Voice<span>Craft</span> Edge</h1>
    <p class="tagline">100% Free · Unlimited · Natural Neural Voices <span class="free-pill">$0</span></p>
  </header>

  <!-- SERVER URL -->
  <div class="sec">Backend Server</div>
  <div class="card">
    <div class="url-row">
      <input class="url-inp" type="url" id="serverUrl" placeholder="https://your-app.onrender.com" autocomplete="off"/>
      <button class="url-save" onclick="saveServer()">CONNECT</button>
    </div>
    <div class="srv-status">
      <span class="sdot" id="sdot"></span>
      <span id="srvMsg">Paste your Render.com URL and click CONNECT</span>
    </div>
  </div>

  <!-- TEXT -->
  <div class="sec">Your Text</div>
  <div class="card">
    <textarea id="textInput" placeholder="Type or paste any English text here… completely free, no limits."></textarea>
    <div class="meta-row">
      <span class="char-pill" id="charPill">0 chars</span>
      <span class="free-note">✦ FREE · No API key needed</span>
    </div>
  </div>

  <!-- VOICE -->
  <div class="sec">Choose Voice</div>
  <div class="card">
    <div class="filter-tabs" id="filterTabs">
      <button class="ftab active" onclick="filterVoices('all',this)">All</button>
      <button class="ftab" onclick="filterVoices('Female',this)">♀ Female</button>
      <button class="ftab" onclick="filterVoices('Male',this)">♂ Male</button>
      <button class="ftab" onclick="filterVoices('US',this)">🇺🇸 US</button>
      <button class="ftab" onclick="filterVoices('UK',this)">🇬🇧 UK</button>
      <button class="ftab" onclick="filterVoices('AU',this)">🇦🇺 AU</button>
    </div>
    <div class="voice-grid" id="voiceGrid">
      <!-- populated by JS -->
    </div>

    <div class="range-row">
      <div class="range-field">
        <div class="rl">
          <label>Speaking Rate</label>
          <span class="rv" id="rateVal">Normal</span>
        </div>
        <input type="range" id="rateRange" min="-50" max="100" step="5" value="0"
          oninput="updateRate(this.value)"/>
      </div>
      <div class="range-field">
        <div class="rl">
          <label>Volume</label>
          <span class="rv" id="volVal">Normal</span>
        </div>
        <input type="range" id="volRange" min="-50" max="50" step="5" value="0"
          oninput="updateVol(this.value)"/>
      </div>
    </div>
  </div>

  <!-- CONVERT -->
  <div class="card" style="animation-delay:.28s">
    <button class="convert-btn" id="convertBtn" onclick="convert()">
      <span class="ci">◆</span> Convert &amp; Download MP3 — Free
    </button>
    <div class="prog-wrap" id="progWrap">
      <div class="spin"></div>
      <div style="flex:1">
        <div class="prog-txt" id="progTxt">Connecting to server…</div>
        <div class="prog-bar-wrap"><div class="prog-bar" id="progBar"></div></div>
      </div>
    </div>
    <div class="result" id="result">
      <div class="rh">
        <div class="rt">Audio Ready</div>
        <button class="dl-btn" id="dlBtn">⬇ Download MP3</button>
      </div>
      <audio id="audioEl" controls></audio>
      <div class="rmeta" id="rmeta"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="sec" style="margin-top:6px">History</div>
  <div class="card" style="animation-delay:.35s">
    <div class="hlist" id="hlist">
      <div class="empty">No conversions yet</div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const VOICES = [
  {id:"en-US-AriaNeural",      name:"Aria",          gender:"Female", accent:"US", style:"Natural, warm"},
  {id:"en-US-JennyNeural",     name:"Jenny",         gender:"Female", accent:"US", style:"Friendly"},
  {id:"en-US-SaraNeural",      name:"Sara",          gender:"Female", accent:"US", style:"Cheerful"},
  {id:"en-US-NancyNeural",     name:"Nancy",         gender:"Female", accent:"US", style:"Pleasant"},
  {id:"en-US-MichelleNeural",  name:"Michelle",      gender:"Female", accent:"US", style:"Warm"},
  {id:"en-US-MonicaNeural",    name:"Monica",        gender:"Female", accent:"US", style:"Lively"},
  {id:"en-US-GuyNeural",       name:"Guy",           gender:"Male",   accent:"US", style:"Deep, natural"},
  {id:"en-US-ChristopherNeural",name:"Christopher",  gender:"Male",   accent:"US", style:"Reliable"},
  {id:"en-US-EricNeural",      name:"Eric",          gender:"Male",   accent:"US", style:"Rational"},
  {id:"en-US-RogerNeural",     name:"Roger",         gender:"Male",   accent:"US", style:"Lively"},
  {id:"en-US-SteffanNeural",   name:"Steffan",       gender:"Male",   accent:"US", style:"Calm"},
  {id:"en-GB-SoniaNeural",     name:"Sonia",         gender:"Female", accent:"UK", style:"British"},
  {id:"en-GB-RyanNeural",      name:"Ryan",          gender:"Male",   accent:"UK", style:"British"},
  {id:"en-AU-NatashaNeural",   name:"Natasha",       gender:"Female", accent:"AU", style:"Australian"},
  {id:"en-AU-WilliamNeural",   name:"William",       gender:"Male",   accent:"AU", style:"Australian"},
];

let selectedVoice = "en-US-AriaNeural";
let history = [];
let lastBlob = null;
let serverUrl = localStorage.getItem('edge_server_url') || '';

// init
if(serverUrl){
  document.getElementById('serverUrl').value = serverUrl;
  pingServer();
}
renderVoices(VOICES);

// ── server ──
function saveServer(){
  const url = document.getElementById('serverUrl').value.trim().replace(/\/$/,'');
  if(!url){toast('⚠ Paste your Render URL first');return}
  localStorage.setItem('edge_server_url', url);
  serverUrl = url;
  pingServer();
}

async function pingServer(){
  setSrv('checking','Checking server…');
  try{
    const r = await fetch(serverUrl+'/voices',{signal:AbortSignal.timeout(8000)});
    if(r.ok){ setSrv('ok','Server connected ✓ Ready to use'); toast('✦ Server connected'); }
    else     { setSrv('err','Server returned error '+r.status); }
  }catch(e){ setSrv('err','Cannot reach server — is it deployed?'); }
}

function setSrv(state,msg){
  document.getElementById('sdot').className='sdot '+state;
  document.getElementById('srvMsg').textContent=msg;
}

// ── voices ──
function renderVoices(list){
  const grid = document.getElementById('voiceGrid');
  grid.innerHTML = list.map(v=>`
    <div class="voice-card${v.id===selectedVoice?' selected':''}" onclick="selectVoice('${v.id}',this)">
      <div class="vc-name">${v.name}</div>
      <div class="vc-meta">
        <span>${v.gender==='Female'?'♀':'♂'}</span>
        <span>${v.accent}</span>
        <span>${v.style}</span>
      </div>
    </div>`).join('');
}

function filterVoices(f, btn){
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = f==='all' ? VOICES : VOICES.filter(v=>v.gender===f||v.accent===f);
  renderVoices(filtered);
}

function selectVoice(id, el){
  selectedVoice = id;
  document.querySelectorAll('.voice-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}

// ── rate / vol ──
function updateRate(v){
  const n=parseInt(v);
  document.getElementById('rateVal').textContent = n===0?'Normal':(n>0?'+'+n+'%':n+'%');
}
function updateVol(v){
  const n=parseInt(v);
  document.getElementById('volVal').textContent = n===0?'Normal':(n>0?'+'+n+'%':n+'%');
}

// ── char count ──
document.getElementById('textInput').addEventListener('input',function(){
  const n=this.value.length;
  const p=document.getElementById('charPill');
  p.textContent=n.toLocaleString()+' chars';
  p.className='char-pill'+(n>48000?' warn':'');
});

// ── convert ──
async function convert(){
  if(!serverUrl){toast('⚠ Connect your server first');return}
  const text=document.getElementById('textInput').value.trim();
  if(!text){toast('⚠ Enter some text first');return}

  const btn=document.getElementById('convertBtn');
  btn.disabled=true;
  document.getElementById('result').classList.remove('show');
  showProg('Sending to server…',20);

  const rateRaw = parseInt(document.getElementById('rateRange').value);
  const volRaw  = parseInt(document.getElementById('volRange').value);
  const rate    = (rateRaw>=0?'+':'')+rateRaw+'%';
  const volume  = (volRaw>=0?'+':'')+volRaw+'%';

  try{
    showProg('Generating neural voice…',55);
    const res = await fetch(serverUrl+'/synthesize',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text, voice:selectedVoice, rate, volume}),
      signal: AbortSignal.timeout(60000)
    });

    showProg('Processing audio…',85);

    if(!res.ok){
      const err = await res.json().catch(()=>({error:'Server error '+res.status}));
      throw new Error(err.error||'Server error');
    }

    lastBlob = await res.blob();
    const url = URL.createObjectURL(lastBlob);

    showProg('Done!',100);
    setTimeout(hideProg,350);

    document.getElementById('audioEl').src=url;
    document.getElementById('result').classList.add('show');

    const voiceName = VOICES.find(v=>v.id===selectedVoice)?.name||selectedVoice;
    document.getElementById('dlBtn').onclick=()=>doDownload(lastBlob,voiceName);

    // AUTO-DOWNLOAD
    doDownload(lastBlob, voiceName);

    const kb=(lastBlob.size/1024).toFixed(1);
    document.getElementById('rmeta').innerHTML=`
      <div class="mi"><span>Voice</span><strong>${voiceName}</strong></div>
      <div class="mi"><span>Rate</span><strong>${rate}</strong></div>
      <div class="mi"><span>Volume</span><strong>${volume}</strong></div>
      <div class="mi"><span>Size</span><strong>${kb} KB</strong></div>
      <div class="mi"><span>Chars</span><strong>${text.length.toLocaleString()}</strong></div>
      <div class="mi"><span>Cost</span><strong>$0.00 🎉</strong></div>`;

    addHistory(text, voiceName, rate, lastBlob);
    toast('✦ MP3 downloaded — Free!');

  }catch(e){
    hideProg();
    toast('✖ '+e.message.slice(0,55));
  }finally{
    btn.disabled=false;
  }
}

function doDownload(blob, name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`voicecraft-edge-${name.toLowerCase()}-${Date.now()}.mp3`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

function showProg(msg,pct){
  document.getElementById('progWrap').classList.add('show');
  document.getElementById('progTxt').textContent=msg;
  document.getElementById('progBar').style.width=pct+'%';
}
function hideProg(){document.getElementById('progWrap').classList.remove('show')}

function addHistory(text,voice,rate,blob){
  history.unshift({text,voice,rate,blob,time:new Date()});
  const list=document.getElementById('hlist');
  list.innerHTML=history.map((h,i)=>{
    const s=h.text.length>65?h.text.slice(0,62)+'…':h.text;
    const t=h.time.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
    return `<div class="hi">
      <span class="hn">${String(i+1).padStart(2,'0')}</span>
      <div class="hinfo">
        <div class="htxt">${s}</div>
        <div class="hsub"><span>${h.voice}</span><span>${h.rate}</span><span>${t}</span></div>
      </div>
      <button class="hdl" onclick="doDownload(history[${i}].blob,'${h.voice}')">⬇ MP3</button>
    </div>`;
  }).join('');
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
</script>
</body>
